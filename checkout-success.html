<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Order confirmed — Safiery</title>
  <link rel="icon" type="image/png" href="assets/img/safiery-logo-2021.png">
  <link rel="stylesheet" href="assets/css/store.css?v=2">
</head>
<body data-nav="">
  <header data-header></header>
  <main id="main" tabindex="-1"><div class="wrap">
    <div class="empty" style="max-width:560px;margin:40px auto">
      <div style="width:74px;height:74px;border-radius:50%;display:grid;place-items:center;margin:0 auto 22px;background:rgba(70,209,127,.14);color:var(--green);border:1px solid rgba(70,209,127,.4)">
        <svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
      <h1 style="font-size:34px">Order confirmed</h1>
      <p class="muted" style="max-width:46ch;margin:12px auto 0">Thank you — your payment was received and a confirmation is on its way to your inbox. Our team in Arundel will be in touch about dispatch and freight.</p>
      <p class="mono" data-session style="color:var(--text-mut);font-size:12px;margin-top:14px"></p>
      <div style="margin-top:26px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <a class="btn btn-primary btn-lg" href="shop.html">Continue shopping</a>
        <a class="btn btn-ghost btn-lg" href="index.html">Home</a>
      </div>
    </div>
  </div></main>
  <footer data-footer></footer>
  <script src="data/catalog.js"></script>
  <script src="data/catalog-links.js"></script>
  <script src="assets/js/store.js?v=2"></script>
  <script src="assets/js/assistant.js" defer></script>
  <script>
    (function () {
      var sid = new URLSearchParams(location.search).get("session_id");
      var note = document.querySelector("[data-session]");

      // Never clear the cart on a bare/bookmarked visit, and never twice for the same session.
      if (!sid) { if (note) note.textContent = "No checkout session — your cart is unchanged."; return; }
      if (note) note.textContent = "Stripe session: " + sid;
      if (sessionStorage.getItem("cleared_" + sid) === "1") return;

      function clearOnce() { Store.clearCart(); sessionStorage.setItem("cleared_" + sid, "1"); }

      // Verify the payment with Stripe before clearing. If the verify function isn't
      // available (e.g. local static preview), fall back to clearing once for this session.
      fetch("/.netlify/functions/verify-session?session_id=" + encodeURIComponent(sid))
        .then(function (r) { return r.json().then(function (j) { return { ok: r.ok, body: j }; }); })
        .then(function (res) {
          if (res.ok && res.body.paid) { clearOnce(); }
          else if (res.ok && res.body.payment_status) {
            if (note) note.textContent += " · payment " + res.body.payment_status;
          } else { clearOnce(); } // function reachable but not configured → fall back
        })
        .catch(function () { clearOnce(); }); // function unreachable (static preview) → fall back
    })();
  </script>
</body>
</html>
