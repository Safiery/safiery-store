# Safiery Store — Netlify configuration
[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"
  # bundle the catalog + the ERP catalog link map with the functions
  included_files = ["data/catalog.js", "data/catalog-links.js"]

[dev]
  framework = "#static"
  port = 8888

# Pretty URLs (optional): /shop -> /shop.html etc.
[[redirects]]
  from = "/shop"
  to = "/shop.html"
  status = 200
[[redirects]]
  from = "/product"
  to = "/product.html"
  status = 200
[[redirects]]
  from = "/cart"
  to = "/cart.html"
  status = 200
[[redirects]]
  from = "/account"
  to = "/account.html"
  status = 200

# Long-cache static media (these are content-stable; rename to bust)
[[headers]]
  for = "/assets/img/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
[[headers]]
  for = "/assets/models/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Code must revalidate so every deploy is picked up (no more stale CSS/JS)
[[headers]]
  for = "/assets/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
[[headers]]
  for = "/assets/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
